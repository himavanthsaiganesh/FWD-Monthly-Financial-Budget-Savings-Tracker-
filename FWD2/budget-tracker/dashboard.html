<!DOCTYPE html>
<html>
<head>

<!-- CO1: HTML Document Structure -->
<title>Dashboard</title>

<!-- CO5: External CSS file for styling -->
<link rel="stylesheet" href="style.css">

<!-- CO5: External library integration (Chart.js for analytics visualization) -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- CO5: External library integration for Excel export -->
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

</head>

<!-- CO2: CSS class used for theme styling -->
<body class="dark">

<!-- CO2: Semantic tag (header) -->
<header class="top-bar">

<!-- CO1: Heading tag -->
<h2>Monthly Financial Budget Savings Tracker</h2>

<div>

<!-- CO4: DOM manipulation target element -->
<span id="welcome"></span>

<!-- CO4: Event handling -->
<button onclick="goProfile()">Profile</button>

</div>

</header>

<!-- CO2: Structured layout container -->
<div class="grid">

<div class="card">

<!-- CO1: Heading -->
<h3>Select Month & Income</h3>

<!-- CO2: Form element (dropdown/select) -->
<select id="month" onchange="loadMonth()">

<option value="">Select Month</option>

<option>January</option>
<option>February</option>
<option>March</option>
<option>April</option>
<option>May</option>
<option>June</option>
<option>July</option>
<option>August</option>
<option>September</option>
<option>October</option>
<option>November</option>
<option>December</option>

</select>

<!-- CO2: Numeric input field -->
<input type="number" id="income" placeholder="Enter income">

<!-- CO4: Event handling -->
<button onclick="saveIncome()">Save Income</button>

</div>

<div class="card">

<h3>Add Expense</h3>

<!-- CO2: Date input type -->
<input type="date" id="date" min="2026-01-01" max="2026-12-31">

<!-- CO2: Text input -->
<input type="text" id="category" placeholder="Category">

<!-- CO2: Numeric input -->
<input type="number" id="amount" placeholder="Amount">

<!-- CO2: Dropdown input -->
<select id="payment">

<option value="">Payment Method</option>
<option>UPI</option>
<option>Cash</option>
<option>Card</option>

</select>

<!-- CO2: Textarea element -->
<textarea id="notes" placeholder="Notes"></textarea>

<!-- CO4: Event handling -->
<button onclick="addExpense()">Add Expense</button>

</div>

<div class="card">

<h3>Savings Goal</h3>

<!-- CO2: Numeric input -->
<input type="number" id="goal" placeholder="Enter saving goal">

<button onclick="saveGoal()">Save Goal</button>

<!-- CO4: DOM display elements -->
<p>Goal: ₹<span id="goalDisplay">0</span></p>

<p>Amount Needed: ₹<span id="remaining">0</span></p>

</div>

<div class="card">

<h3>Monthly Summary</h3>

<!-- CO4: Dynamic data display -->
<p>Total Expense: ₹<span id="total">0</span></p>

<p>Savings: ₹<span id="savings">0</span></p>

<p id="alert" class="alert"></p>

<!-- CO5: Data export functionality -->
<button onclick="exportExcel()">Download Excel</button>

<!-- CO4: Event handling -->
<button onclick="resetMonth()" class="danger">Delete Month Report</button>

</div>

<div class="card wide">

<h3>Expense Analytics</h3>

<!-- CO5: Data visualization using Chart.js -->
<canvas id="chart"></canvas>

</div>

<div class="card">

<h3>Calculator</h3>

<!-- CO4: DOM element for dynamic display -->
<input type="text" id="calcDisplay" readonly>

<div class="calc-grid">

<!-- CO3: JavaScript expressions through button inputs -->
<button onclick="press('7')">7</button>
<button onclick="press('8')">8</button>
<button onclick="press('9')">9</button>
<button onclick="press('/')">÷</button>

<button onclick="press('4')">4</button>
<button onclick="press('5')">5</button>
<button onclick="press('6')">6</button>
<button onclick="press('*')">×</button>

<button onclick="press('1')">1</button>
<button onclick="press('2')">2</button>
<button onclick="press('3')">3</button>
<button onclick="press('-')">−</button>

<button onclick="press('0')">0</button>
<button onclick="press('.')">.</button>

<!-- CO3: Function call for calculation -->
<button onclick="calculateResult()">=</button>

<button onclick="press('+')">+</button>

<!-- CO3: Function call -->
<button onclick="clearCalc()" class="wide-btn">Clear</button>

</div>

</div>

</div>

<!-- CO5: External JavaScript module for functionality -->
<script src="script.js"></script>

</body>
</html>
